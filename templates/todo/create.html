{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="container">
  <h2>Create a New Todo</h2>
    <div>
      <label for="name">Name:</label>
      <input type="text" name="name" id="name">
    </div>

    <div>
      <label for="description">Description:</label>
      <textarea name="description" id="description">
      </textarea>
    </div>

    <div>
      <label for="complete">Complete:</label>
      <input type="checkbox" name="complete" id="complete">
    </div>

    <div>
      <label for="exp">Experience Points:</label>
      <input type="number" name="exp" id="exp" min="0">
    </div>

    <button type="submit" id="todoCreate">Create</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
  document.getElementById("todoCreate").addEventListener("click", async () => {

    // 1. axios 인스턴스 생성 (현재 코드에서 'api'가 정의되지 않아 오류가 났을 가능성이 큼)
    const api = axios.create({
      baseURL: "/",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": "{{ csrf_token }}" // 2. Django 보안 토큰 반드시 필요
      }
    });

    try {
      // 3. URL 앞에 '/'를 붙여 절대 경로로 지정 (/todo/viewsets/view/)
      const res = await api.post("/todo/viewsets/view/", {
        name: document.getElementById("name").value,
        description: document.getElementById("description").value,
        complete: document.getElementById("complete").checked,
        exp: Number(document.getElementById("exp").value || 0)
      });

      console.log("생성 성공:", res.data);
      alert("등록되었습니다!");
      window.location.href = "/todo/list/"; // 등록 후 리스트로 이동

    } catch (err) {
      console.error("에러 발생:", err.response?.data || err.message);
      alert("등록 실패: " + JSON.stringify(err.response?.data));
    }
  });

</script>
{% endblock %}
